name: Build Pylon for Termux (AArch64)

on: [workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Pylon
      uses: actions/checkout@v4
      with:
        repository: zerotier/pylon
        submodules: 'recursive'
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK & NDK
      uses: android-actions/setup-android@v3

    - name: Install NDK & CMake
      run: |
        # Using the versions that worked for you previously
        sdkmanager "ndk;25.1.8937393" "cmake;3.22.1"
        
        NDK_PATH="$ANDROID_SDK_ROOT/ndk/25.1.8937393"
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK_PATH=$NDK_PATH" >> $GITHUB_ENV
        echo "$ANDROID_SDK_ROOT/cmake/3.22.1/bin" >> $GITHUB_PATH

    - name: Build libzt Dependency (Static)
      run: |
        cd ext/libzt
        mkdir -p build_stat && cd build_stat
        
        # 1. Corrected the path to android.toolchain.cmake
        # 2. Added -G "Unix Makefiles" to ensure it finds 'make'
        cmake .. \
          -G "Unix Makefiles" \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24 \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=OFF \
          -DZT_SDK_VIRTUAL_NETWORKSTACK=ON \
          -DZT_NO_LOGGING=ON
        
        make -j$(nproc)

    - name: Build Pylon Binary
      run: |
        LIBZT_PATH=$(find ext/libzt/build_stat -name "libzt.a" | head -n 1)
        echo "Found libzt.a at: $LIBZT_PATH"
        
        # Patch pylon.cpp: 
        # 1. Swap bits header
        # 2. Properly wrap ZeroTierSockets.h in extern "C"
        sed -i 's|<bits/types.h>|<sys/types.h>|g' pylon.cpp
        
        # This multi-line insertion is cleaner for the compiler
        sed -i '/#include "ZeroTierSockets.h"/i extern "C" {' pylon.cpp
        sed -i '/#include "ZeroTierSockets.h"/a }' pylon.cpp
        
        TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
        CLANG_PATH="$TOOLCHAIN/bin/aarch64-linux-android24-clang++"
        SYSROOT="$TOOLCHAIN/sysroot"
        
        # Added -DZT_SDK_VIRTUAL_NETWORKSTACK=1 to the compiler flags
        $CLANG_PATH -O3 \
          --sysroot=$SYSROOT \
          -DZT_SDK_VIRTUAL_NETWORKSTACK=1 \
          -I$SYSROOT/usr/include \
          -I$SYSROOT/usr/include/aarch64-linux-android \
          -Iext/libzt/include \
          -Iext/libzt/ext/ZeroTierOne/include \
          -Iext/libzt/ext/ZeroTierOne/node \
          -Iext/libzt/ext/ZeroTierOne/osdep \
          -Iext/libzt/ext/ZeroTierOne/ext/prometheus-cpp-lite-1.0/core/include \
          -Iext/libzt/ext/ZeroTierOne/ext/prometheus-cpp-lite-1.0/simpleapi/include \
          -Iext/libzt/ext/ZeroTierOne/ext/prometheus-cpp-lite-1.0/3rdparty/http-client-lite/include \
          -std=c++11 pylon.cpp -o pylon_arm64 \
          $LIBZT_PATH \
          -llog -landroid -latomic -static-libstdc++

    - name: Upload Pylon for Termux
      uses: actions/upload-artifact@v4
      with:
        name: pylon-termux-arm64
        path: pylon_arm64
