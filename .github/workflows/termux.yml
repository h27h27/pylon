name: Build Pylon for Termux (AArch64)

on: [workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Pylon
      uses: actions/checkout@v4
      with:
        repository: zerotier/pylon
        submodules: 'recursive'
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK & NDK
      uses: android-actions/setup-android@v3

    - name: Install NDK & CMake
      run: |
        # Using the versions that worked for you previously
        sdkmanager "ndk;25.1.8937393" "cmake;3.22.1"
        
        NDK_PATH="$ANDROID_SDK_ROOT/ndk/25.1.8937393"
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK_PATH=$NDK_PATH" >> $GITHUB_ENV
        echo "$ANDROID_SDK_ROOT/cmake/3.22.1/bin" >> $GITHUB_PATH

    - name: Build libzt Dependency (Static)
      run: |
        cd ext/libzt
        mkdir -p build_stat && cd build_stat
        
        # We add ZT_SDK_VIRTUAL_NETWORKSTACK to the global CXX flags
        # AND the specific CMake variable as a double-measure.
        cmake .. \
          -G "Unix Makefiles" \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24 \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=OFF \
          -DZT_SDK_VIRTUAL_NETWORKSTACK=ON \
          -DZT_BUILD_VIRTUAL_NETWORK_STACK=ON \
          -DCMAKE_CXX_FLAGS="-DZT_SDK_VIRTUAL_NETWORKSTACK=1 -DZT_BUILD_VIRTUAL_NETWORK_STACK=1" \
          -DCMAKE_C_FLAGS="-DZT_SDK_VIRTUAL_NETWORKSTACK=1 -DZT_BUILD_VIRTUAL_NETWORK_STACK=1"
        
        make -j$(nproc)

    - name: Build Pylon Binary (Final Linker Pass)
      run: |
        # 1. Extraction - Include EVERYTHING this time
        mkdir -p obj_extract
        
        # We find all .a files. 
        # libzto_pic.a (Core)
        # libzt_pic.a (Socket API)
        # liblwip_pic.a (Stack)
        # libminiupnpc_pic.a (UPnP - Needed for PortMapper)
        # libnatpmp_pic.a (NAT-PMP)
        LIBS=$(find ext/libzt/build_stat -name "*.a")
        echo "Found libraries to merge: $LIBS"
        
        for LIB in $LIBS; do
          echo "Extracting $LIB..."
          cd obj_extract
          # We use 'xo' to extract and overwrite to ensure we have one copy of every .o
          $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar xo ../$LIB
          cd ..
        done

        # 2. Patch pylon.cpp and headers
        sed -i 's|<bits/types.h>|<sys/types.h>|g' pylon.cpp
        ZTS_HEADER="ext/libzt/include/ZeroTierSockets.h"
        echo -e "#ifdef __cplusplus\nextern \"C\" {\n#endif\n$(cat $ZTS_HEADER)\n#ifdef __cplusplus\n}\n#endif" > "$ZTS_HEADER"

        # 3. Define NDK Paths
        TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
        CLANG_PATH="$TOOLCHAIN/bin/aarch64-linux-android24-clang++"
        SYSROOT="$TOOLCHAIN/sysroot"

        # 4. Final Compilation
        # Note: We keep the Prometheus include paths added in the last step
        $CLANG_PATH -O3 \
          --sysroot=$SYSROOT \
          -DZT_SDK_VIRTUAL_NETWORKSTACK=1 \
          -I$SYSROOT/usr/include \
          -I$SYSROOT/usr/include/aarch64-linux-android \
          -Iext/libzt/include \
          -Iext/libzt/ext/ZeroTierOne/include \
          -Iext/libzt/ext/ZeroTierOne/node \
          -Iext/libzt/ext/ZeroTierOne/osdep \
          -Iext/libzt/ext/ZeroTierOne/ext/prometheus-cpp-lite-1.0/core/include \
          -Iext/libzt/ext/ZeroTierOne/ext/prometheus-cpp-lite-1.0/simpleapi/include \
          -Iext/libzt/ext/ZeroTierOne/ext/prometheus-cpp-lite-1.0/3rdparty/http-client-lite/include \
          -std=c++11 pylon.cpp \
          obj_extract/*.o \
          -o pylon_arm64 \
          -llog -landroid -latomic -static-libstdc++

    - name: Upload Pylon for Termux
      uses: actions/upload-artifact@v4
      with:
        name: pylon-termux-arm64
        path: pylon_arm64
