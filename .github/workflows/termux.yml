name: Build Pylon for Termux (AArch64)

on: [workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Pylon
      uses: actions/checkout@v4
      with:
        repository: zerotier/pylon
        submodules: 'recursive'
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK & NDK
      uses: android-actions/setup-android@v3

    - name: Install NDK & CMake
      run: |
        # Using the versions that worked for you previously
        sdkmanager "ndk;25.1.8937393" "cmake;3.22.1"
        
        NDK_PATH="$ANDROID_SDK_ROOT/ndk/25.1.8937393"
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK_PATH=$NDK_PATH" >> $GITHUB_ENV
        echo "$ANDROID_SDK_ROOT/cmake/3.22.1/bin" >> $GITHUB_PATH

    - name: Build libzt Dependency (Static)
      run: |
        cd ext/libzt
        mkdir -p build_stat && cd build_stat
        
        # Manually invoke CMake to build the static library for Android ARM64
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24 \
          -DZT_SDK_FLAGS="-DZT_NO_LOGGING" \
          -DCMAKE_BUILD_TYPE=Release
        
        make -j$(nproc) zt-static

    - name: Build Pylon Binary
      run: |
        # We manually link Pylon to the static library we just built
        # This bypasses the need for the 'dist' folder entirely
        
        aarch64-linux-gnu-g++ -O3 \
          -Iext/libzt/include \
          -Iext/libzt/ext/ZeroTierOne/osdep \
          -Iext/libzt/ext/ZeroTierOne/node \
          -std=c++11 pylon.cpp -o pylon_arm64 \
          ext/libzt/build_stat/libzt.a \
          -lpthread

    - name: Upload Pylon for Termux
      uses: actions/upload-artifact@v4
      with:
        name: pylon-termux-arm64
        path: pylon_arm64
